<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Spring Guardian</title>
  <desc id="desc">Modern shield logo for Spring Guardian, protecting Spring projects from architectural risks.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="16" x2="226" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10251f"/>
      <stop offset="1" stop-color="#061510"/>
    </linearGradient>
    <linearGradient id="shield" x1="73" y1="45" x2="179" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#78f0b2"/>
      <stop offset="0.52" stop-color="#25c982"/>
      <stop offset="1" stop-color="#0f8f61"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <circle cx="206" cy="48" r="28" fill="#16a34a" opacity="0.18"/>
  <circle cx="45" cy="206" r="34" fill="#38bdf8" opacity="0.10"/>

