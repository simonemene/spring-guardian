    <path d="M44 86l-20 20 20 20"/>
    <path d="M212 86l20 20-20 20"/>
    <path d="M191 70l-17 70"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M128 31l76 29v58c0 48-28 86-76 106-48-20-76-58-76-106V60l76-29z" fill="url(#shield)" stroke="#d1fae5" stroke-width="8" stroke-linejoin="round"/>
    <path d="M88 104l-22 22 22 22" fill="none" stroke="#052e16" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M168 104l22 22-22 22" fill="none" stroke="#052e16" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M143 86l-30 84" fill="none" stroke="#052e16" stroke-width="12" stroke-linecap="round"/>
    <path d="M84 70c19-12 49-21 88 0" fill="none" stroke="#ecfdf5" stroke-opacity="0.55" stroke-width="7" stroke-linecap="round"/>
